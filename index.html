<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>

<body>
    <header>
        <h1>Counter App</h1>
    </header>
    <main>
        <p id="result" class="result">0</p>
        <div>
            <button id="decreasebtn" class="btn decreasebtn">-</button>
            <button id="resetbtn" class="btn resetbtn">Reset</button>
            <button id="increasebtn" class="btn increasebtn">+</button>
        </div>
        <p>Count between 0 to 99</p>
    </main>
    <footer>
        Developed by - MD SOJIB HOSSAIN
    </footer>

</body>

</html>
